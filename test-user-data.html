<!DOCTYPE html>
<html lang="en">
<head>

    <title>Test User Data</title>
    <style>
        body {

            max-width: 800px;

            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;

</head>

    </div>
